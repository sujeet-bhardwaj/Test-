<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Weather App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="outer">
        <div class="search-box">
             <i class="fa-solid :fa-location-dot location-icon"></i>
             <input type="text" placeholder="Enter Your City">
             <button onclick="search()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div class="weather-info">
            <div class="weather-icon">
                <i class="fa-solid fa-cloud-sun-rain animate-cloud"></i>
            </div>
            <div class="empty">
              <h1>Please Enter City</h1>    
            </div>

            <h1 class="temp same" >33°C</h1>
            <h2 class="city same"></h2>
            
            <div class="details-container">
                <div class="detail-card same">
                    <i class="fa-solid fa-droplet"></i>
                    <div class="same">
                        <p class="value" >10%</p>
                        <p class="label ">Humidity</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="Js/script.js"></script>
</body>
</html>
